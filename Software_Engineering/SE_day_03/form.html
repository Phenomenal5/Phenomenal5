<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Application Form</h1>
    <br/><br/>
    <form action="">
        <label for="firstName">First Name:</label>
        <input type="text"/>

        <label for="lastName">Last Name: </label>
        <input type="text"/>
        <br/><br/>
        <label for="dateOfBirth">Date of birth: </label>
        <input type="date"/>

        <label for="age">Age: </label>
        <input type="number"/>
        <br/><br/>
        <label for="gender">Gender: </label>
        <select name="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <label for="email">Email Address: </label>
        <input type="email" placeholder="Enter email address"/>
        <br/><br/>
        <label>Position Available: </label>
        <input type="radio" name="position" value="Junior Developer"/>
        <label>Junior Developer</label>

        <input type="radio" name="position" value="Mid-level Developer"/>
        <label>Mid-level Developer</label>

        <input type="radio" name="position" value="Senior Developr"/>
        <label>Senior Developer</label>
        <br><br>

        <label> Programming Language: </label>
        <input type="checkbox"/>
        <label>Java</label>

        <input type="checkbox"/>
        <label>Javascript</label>

        <input type="checkbox"/>
        <label>Python</label>
        <br/><br/>
        <label for="password">Password: </label>
        <input type="password"/>

        <label for="confirmpassword">Confirm Password: </label>
        <input type="password"/>
        <br/><br/>
        <input type="submit" value="Submit"/>
        <input type="submit" value="Reset"/>
    </form>
</body>
</html>
