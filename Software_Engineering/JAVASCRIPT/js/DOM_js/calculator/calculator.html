<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="container">
        <div id="display">
            <input id="input" placeholder="0" readonly>
        </div>
        <div id="buttons">
            <button onclick="delet()">Del</button>
            <button onclick="calculate(1)">1</button>
            <button onclick="calculate(2)">2</button>
            <button onclick="calculate(3)">3</button>
            <button onclick="calculate(4)">4</button>
            <button onclick="calculate(5)">5</button>
            <button onclick="calculate(6)">6</button>
            <button onclick="calculate(7)">7</button>
            <button onclick="calculate(8)">8</button>
            <button onclick="calculate(9)">9</button>
            <button onclick="calculate('.')">.</button>
            <button onclick="calculate(0)">0</button>
            <button onclick="calculate('+')">+</button>
            <button onclick="calculate('-')">-</button>
            <button onclick="calculate('*')">&Cross;</button>
            <button onclick="calculate('/')">&divide;</button>
            <button onclick="result()" type="submit">=</button>  
            <div class="box" ><button id="clr" onclick= "clearDisplay()">clear all</button>  
        </div>
    </div>
    <script src="./calculator.js"></script>
</body>
</html>
